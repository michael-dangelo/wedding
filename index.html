<!DOCTYPE html>
<html lang="en-CA">
<head>
  <title>Irina & Michael</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="main.css" rel="stylesheet">
</head>
<body>
  <main>
    <section class="hero">
      <p class="hero__preamble">Together with their families</p>
      <div class="hero__ornament">
        <div class="hero__rule">
          <span></span>
          <span></span>
        </div>
        <span class="hero__fleuron">❦</span>
        <div class="hero__rule">
          <span></span>
          <span></span>
        </div>
      </div>
      <h1 class="hero__names">
        Irina<br>
        <span class="hero__ampersand">&</span><br>
        Michael
      </h1>
      <div class="hero__date-divider"></div>
      <p class="hero__date">Saturday, June 13, 2026</p>
      <p class="hero__location">
        Edgewater Manor
      </p>
      <p class="hero__location-subline">
        518 Fruitland Rd · Stoney Creek, Ontario · L8E 5A6
      </p>
      <a
        href="https://www.google.com/maps/dir//Edgewater+Manor,+518+Fruitland+Rd,+Stoney+Creek,+ON+L8E+5A6"
        class="details__directions hero__location-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        Get directions
      </a>
    </section>

    <section class="details">
      <div class="details__section details__section--cta">
        <button class="details__rsvp" type="button">
          RSVP
        </button>
        <p class="details__note">
          Kindly respond by April 30
        </p>
      </div>

      <div class="details__section">
        <h2 class="details__heading">Schedule</h2>
        <p class="details__body">
          5:00 pm &mdash; Ceremony<br>
          5:30 pm &mdash; Cocktails<br>
          6:00 pm &mdash; Dinner &amp; dancing
        </p>
      </div>

      <div class="details__section">
        <h2 class="details__heading">Dress</h2>
        <p class="details__body">
          Cocktail attire
        </p>
      </div>
    </section>
  </main>
</body>
</html>
