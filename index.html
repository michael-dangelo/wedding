<!DOCTYPE html>
<html lang="en-CA">
<head>
  <title>Irina & Michael</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link href="main.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.svg">
</head>
<body>
  <main>
    <section class="hero">
      <p class="hero__preamble">Together with their families</p>
      <div class="hero__ornament hero__ornament_main">
        <div class="hero__rule">
          <span></span>
          <span></span>
        </div>
        <span class="hero__fleuron">❦</span>
        <div class="hero__rule">
          <span></span>
          <span></span>
        </div>
      </div>
      <h1 class="hero__names">
        Irina<br>
        <span class="hero__ampersand">&</span><br>
        Michael
      </h1>
      <div class="hero__divider"></div>
      <p class="hero__date">Saturday, June 13, 2026</p>
      <p class="hero__location">
        Edgewater Manor
      </p>
      <p class="hero__location-subline">
        518 Fruitland Rd<br>
        Stoney Creek, Ontario<br>
        L8E 5A6
      </p>
      <div class="action-row">
        <a href="rsvp.html" class="wedding-btn rsvp-style">RSVP</a>
        <div class="vertical-divider"></div>
        <a
          href="https://www.google.com/maps/dir//Edgewater+Manor,+518+Fruitland+Rd,+Stoney+Creek,+ON+L8E+5A6"
          class="wedding-btn"
        >
          Directions
        </a>
      </div>
    </section>

    <section class="details">
      <div class="details__section">
        <h2 class="details__heading">Schedule</h2>
        <div class="timeline">
          <div class="event">
            <div class="dot"></div>
            <div class="icon-space">
            </div>
            <div class="event-text">
              <span class="event-name">Ceremony</span>
              <span class="event-time">5:00 pm</span>
            </div>
          </div>
          <div class="event">
            <div class="dot"></div>
            <div class="icon-space">
            </div>
            <div class="event-text">
              <span class="event-name">Cocktails</span>
              <span class="event-time">5:30 pm</span>
            </div>
          </div>
          <div class="event">
            <div class="dot"></div>
            <div class="icon-space">
            </div>
            <div class="event-text">
              <span class="event-name">Dinner/Dance</span>
              <span class="event-time">6:00 pm</span>
            </div>
          </div>
        </div>
      </div>
      <div class="details__section">
        <h2 class="details__heading">Dress</h2>
        <p>Cocktail attire</p>
      </div>
    </section>
  </main>
</body>
</html>
